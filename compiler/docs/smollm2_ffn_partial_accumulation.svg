    <text x="376" y="260">P0</text><text x="452" y="260">P1</text><text x="528" y="260">P2</text><text x="604" y="260">P3</text><text x="680" y="260">P4</text><text x="756" y="260">P5</text><text x="832" y="260">P6</text><text x="908" y="260">P7</text><text x="984" y="260">P8</text><text x="1060" y="260">P9</text><text x="1136" y="260">P10</text><text x="1212" y="260">P11</text><text x="1288" y="260">P12</text><text x="1364" y="260">P13</text><text x="1440" y="260">P14</text><text x="1516" y="260">P15</text><text x="1592" y="260">P16</text><text x="1668" y="260">P17</text>
    <text x="388" y="316">+P0</text><text x="464" y="316">+P1</text><text x="540" y="316">+P2</text><text x="616" y="316">+P3</text><text x="692" y="316">+P4</text><text x="768" y="316">+P5</text><text x="844" y="316">+P6</text><text x="920" y="316">+P7</text><text x="996" y="316">+P8</text><text x="1072" y="316">+P9</text><text x="1148" y="316">+P10</text><text x="1224" y="316">+P11</text><text x="1300" y="316">+P12</text><text x="1376" y="316">+P13</text><text x="1452" y="316">+P14</text><text x="1528" y="316">+P15</text><text x="1604" y="316">+P16</text><text x="1680" y="316">+P17</text>
    <text x="386" y="372">+P0</text><text x="462" y="372">+P1</text><text x="538" y="372">+P2</text><text x="614" y="372">+P3</text><text x="690" y="372">+P4</text><text x="766" y="372">+P5</text><text x="842" y="372">+P6</text><text x="918" y="372">+P7</text><text x="994" y="372">+P8</text><text x="1070" y="372">+P9</text><text x="1146" y="372">+P10</text><text x="1222" y="372">+P11</text><text x="1298" y="372">+P12</text><text x="1374" y="372">+P13</text><text x="1450" y="372">+P14</text><text x="1526" y="372">+P15</text><text x="1602" y="372">+P16</text><text x="1678" y="372">+P17</text>
  </g>

