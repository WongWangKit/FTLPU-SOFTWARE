  <rect x="1648" y="519" width="64" height="32" rx="3" class="final"/>
  <text x="1680" y="540" text-anchor="middle" class="bar">S17</text>
  <rect x="1450" y="575" width="262" height="32" rx="3" class="phase"/>
  <text x="1581" y="596" text-anchor="middle" class="bar">SRAM complete; later read as W0..W7</text>
  <rect x="260" y="631" width="1430" height="32" rx="3" class="phase"/>
  <text x="975" y="652" text-anchor="middle" class="bar">Gate: local slices 36..39; Up: local slices 40..43. East and west use distinct physical MEM/SREG identities.</text>

  <rect x="44" y="730" width="1668" height="104" rx="5" class="phase"/>
  <text x="66" y="760" class="note">For block i, logical MXM issue begins at cycle 42 + 38*i. The gate accumulator begins at 48 + 38*i; the up accumulator begins at 47 + 38*i. Each has repeat_count=32 and accumulates one 32x32 FP32 P&lt;i&gt; tile.</text>
  <text x="66" y="789" class="note">S0 means P0; S1 means P0+P1; ...; S17 means P0+...+P17. Only after S17 is complete does the current conservative lowering defer SwiGLU to the global projection tail.</text>
  <text x="66" y="818" class="note">This figure is the complete K reduction for one output tile, not the 24 output pairs of the full 1536-wide gate/up projection.</text>
</svg>
