    <line x1="1476" y1="162" x2="1476" y2="684"/><line x1="1628" y1="162" x2="1628" y2="684"/><line x1="1700" y1="162" x2="1700" y2="684"/>
  </g>

  <g>
    <rect x="230" y="175" width="1490" height="48" class="lane"/><rect x="230" y="231" width="1490" height="48" class="lane"/>
    <rect x="230" y="287" width="1490" height="48" class="lane"/><rect x="230" y="343" width="1490" height="48" class="lane"/>
    <rect x="230" y="399" width="1490" height="48" class="lane"/><rect x="230" y="455" width="1490" height="48" class="lane"/>
