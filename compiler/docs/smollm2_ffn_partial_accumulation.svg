<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="890" viewBox="0 0 1800 890" role="img" aria-labelledby="title desc">
  <title id="title">SmolLM2 FFN K partial accumulation timeline</title>
  <desc id="desc">All 18 K equals 32 partial tiles for one M equals 32 N equals 32 gate and up projection tile accumulate into local SRAM.</desc>
  <style>
    text { font-family: "Segoe UI", Arial, sans-serif; fill: #17212b; letter-spacing: 0; }
    .title { font-size: 29px; font-weight: 700; }
    .subtitle { font-size: 15px; fill: #536170; }
    .row { font-size: 15px; font-weight: 600; }
    .small { font-size: 11px; fill: #4e5965; }
    .bar { font-size: 11px; font-weight: 600; }
    .note { font-size: 14px; fill: #334150; }
    .axis { stroke: #4a5560; stroke-width: 2; }
    .grid { stroke: #dbe2e8; stroke-width: 1; }
    .lane { fill: #fafbfc; stroke: #d8dee5; stroke-width: 1; }
    .gate { fill: #91b8e8; stroke: #41678f; stroke-width: 1.2; }
    .up { fill: #b1a7df; stroke: #5e568d; stroke-width: 1.2; }
    .gateacc { fill: #dca2c2; stroke: #814f6b; stroke-width: 1.2; }
    .upacc { fill: #efb07c; stroke: #975f31; stroke-width: 1.2; }
    .state { fill: #e8edf2; stroke: #7b8996; stroke-width: 1.1; }
    .final { fill: #90c9a8; stroke: #416b54; stroke-width: 1.2; }
    .phase { fill: #f4f7f9; stroke: #c9d1d9; stroke-width: 1.2; }
  </style>

  <rect width="1800" height="890" fill="#ffffff"/>
  <text x="44" y="48" class="title">SmolLM2-135M FFN: All 18 K Partial Accumulations</text>
  <text x="44" y="75" class="subtitle">One hemisphere, one logical M=32 and N=32 output tile. K=576 is reduced as 18 K=32 partial tiles P0..P17.</text>
  <text x="44" y="107" class="note">The bars show the logical 32-row block windows. Some physical activation commands are segmented around weight prefetch, but every block still contributes exactly one P&lt;i&gt; to the same local accumulator tile.</text>

  <line x1="260" y1="152" x2="1700" y2="152" class="axis"/>
  <text x="1710" y="157" class="row">cycle</text>
  <g class="small" text-anchor="middle">
    <text x="260" y="141">0</text><text x="412" y="141">76</text><text x="564" y="141">152</text><text x="716" y="141">228</text>
    <text x="868" y="141">304</text><text x="1020" y="141">380</text><text x="1172" y="141">456</text><text x="1324" y="141">532</text>
    <text x="1476" y="141">608</text><text x="1628" y="141">684</text><text x="1700" y="141">720</text>
  </g>
  <g class="grid">
